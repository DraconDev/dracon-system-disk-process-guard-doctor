[package]
name = "dracon-system"
version = "0.2.2"
edition = "2021"
license = "AGPL-3.0-only"
description = "Disk, process, storage, and service diagnostics for local development machines"
readme = "README.md"
repository = "https://github.com/DraconDev/dracon-system-disk-process-guard-doctor"
homepage = "https://github.com/DraconDev/dracon-system-disk-process-guard-doctor"
documentation = "https://docs.rs/dracon-system/0.2.0"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
dirs = "6.0"
fs2 = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "process", "time", "signal", "sync"] }
walkdir = "2"
chrono = "0.4"
comfy-table = "7"
dracon-system-lib = { path = "../dracon-libs/tools/system/dracon-system" }

